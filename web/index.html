<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisasi Graph Dijkstra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Visualisasi Graph Pengiriman Paket</h1>

        <svg width="900" height="500">

            <!-- EDGE -->
            <line x1="120" y1="220" x2="280" y2="120" class="edge" />
            <text x="190" y="160">8</text>

            <line x1="120" y1="220" x2="280" y2="320" class="edge" />
            <text x="190" y="290">12</text>

            <line x1="280" y1="120" x2="280" y2="320" class="edge" />
            <text x="290" y="220">3</text>

            <line x1="280" y1="120" x2="470" y2="180" class="edge" />
            <text x="360" y="140">7</text>

            <line x1="280" y1="320" x2="470" y2="180" class="edge" />
            <text x="360" y="260">2</text>

            <line x1="280" y1="320" x2="650" y2="120" class="edge" />
            <text x="470" y="190">15</text>

            <line x1="470" y1="180" x2="650" y2="120" class="edge" />
            <text x="560" y="130">6</text>

            <line x1="470" y1="180" x2="650" y2="320" class="edge" />
            <text x="560" y="250">10</text>

            <line x1="650" y1="120" x2="650" y2="320" class="edge" />
            <text x="660" y="220">4</text>

            <!-- NODE -->
            <circle cx="120" cy="220" r="35" class="node" />
            <text x="112" y="227" class="label">A</text>

            <circle cx="280" cy="120" r="35" class="node" />
            <text x="272" y="127" class="label">B</text>

            <circle cx="280" cy="320" r="35" class="node" />
            <text x="272" y="327" class="label">C</text>

            <circle cx="470" cy="180" r="35" class="node" />
            <text x="462" y="187" class="label">D</text>

            <circle cx="650" cy="120" r="35" class="node" />
            <text x="642" y="127" class="label">E</text>

            <circle cx="650" cy="320" r="35" class="node" />
            <text x="642" y="327" class="label">F</text>

        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
